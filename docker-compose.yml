# 🐳 Docker Compose - Defines the multi-service local environment.
# This file implements the "Local Dev = Prod" principle by running the API, UI, and Database
# as separate but connected services, mirroring the production setup.
# Reference: agent.md - The System Kernel for AI behavior and rules.
# Reference: workflow/06_INFRASTRUCTURE_AS_CODE.md

services:
  # 1. API Service (Audit, Backend Logic)
  api:
    build:
      context: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./config:/app/config
    depends_on:
      db:
        condition: service_healthy

  # 2. UI Service (Streamlit Frontend)
  ui:
    build:
      context: .
    command: streamlit run app/ui.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./config:/app/config
      - ./reports:/app/reports
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started

  # 3. Database (PostgreSQL)
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=intake_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d intake_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
