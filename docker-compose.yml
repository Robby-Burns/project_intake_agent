version: '3.8'

services:
  # 1. API Service (Audit, Backend Logic)
  # Reference: workflow/09_AUDIT_AND_MAINTENANCE.md
  api:
    build:
      context: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/intake_agent
      - RISK_SCORE=8
    depends_on:
      - db
    volumes:
      - ./app:/app/app
      - ./docs:/app/docs

  # 2. UI Service (Streamlit Frontend)
  ui:
    build:
      context: .
    command: streamlit run app/ui.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/intake_agent
      - API_URL=http://api:8000
    depends_on:
      - api
      - db
    volumes:
      - ./app:/app/app

  # 3. Database (PostgreSQL)
  # Reference: workflow/08_AGNOSTIC_FACTORIES.md
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=intake_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
